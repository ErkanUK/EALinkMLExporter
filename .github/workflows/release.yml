name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output publish

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath EA17LinkMLExporter.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: EA17LinkMLExporter.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
